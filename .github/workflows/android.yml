name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install FFmpeg for sounds
      run: |
        sudo apt-get update && sudo apt-get install -y ffmpeg
        mkdir -p src/assets
        ffmpeg -f lavfi -i "sine=frequency=800:duration=0.1" -ar 44100 src/assets/move.wav -y
        ffmpeg -f lavfi -i "sine=frequency=400:duration=0.2" -ar 44100 src/assets/capture.wav -y
        ffmpeg -f lavfi -i "sine=frequency=1200:duration=0.3" -ar 44100 src/assets/king.wav -y

    - name: Build APK
      run: |
        make android

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: DamasG1-Android
        path: build/*.apk
